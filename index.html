<!DOCTYPE html>
<html>
<head>
  <title>EQ Learning</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fb;
    }

    .app {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-top: 20px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff8c00, #ff5e00);
      color: white;
      cursor: pointer;
    }

    .option {
      background: #f1f3f7;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      background: #ffe0cc;
    }

    .hidden {
      display: none;
    }

    .progress {
      height: 8px;
      background: #eee;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, orange, red);
      transition: 0.5s;
    }

    .feedback {
      margin-top: 15px;
      font-weight: bold;
    }

    .emoji {
      font-size: 24px;
      margin-right: 8px;
    }
  </style>
</head>

<body>

<div class="app">

  <div id="dashboard" class="card">
    <h2>EQ Learning</h2>
    <p>XP: <span id="xp">0</span></p>

    <div class="progress">
      <div id="bar" class="bar"></div>
    </div>

    <button class="btn" onclick="start()">Start Learning</button>
  </div>

  <div id="scenario" class="card hidden">
    <h3 id="question"></h3>
    <div id="options"></div>

    <p id="feedback" class="feedback"></p>

    <button id="next" class="btn hidden" onclick="next()">Next</button>
  </div>

</div>

<script>
let xp = 0;
let index = 0;

const data = [
  {
    q: "Your manager interrupts you in a meeting. What do you do?",
    o: [
      {t:"😠 Interrupt back", s:0, f:"This escalates tension."},
      {t:"🙂 Stay calm & respond later", s:10, f:"Excellent emotional control."},
      {t:"😐 Stay silent", s:5, f:"Safe, but misses opportunity."}
    ]
  },
  {
    q: "A teammate misses deadline.",
    o: [
      {t:"😡 Call out publicly", s:0, f:"Damages trust."},
      {t:"🤝 Discuss privately", s:10, f:"Strong empathy and leadership."},
      {t:"😶 Ignore", s:5, f:"Short-term fix only."}
    ]
  }
];

function start(){
  dashboard.classList.add("hidden");
  scenario.classList.remove("hidden");
  load();
}

function load(){
  feedback.innerText = "";
  next.classList.add("hidden");

  let d = data[index];
  question.innerText = d.q;

  options.innerHTML = "";

  d.o.forEach(opt=>{
    let div = document.createElement("div");
    div.className = "option";
    div.innerHTML = opt.t;

    div.onclick = ()=>{
      animateXP(opt.s);
      feedback.innerText = opt.f;

      update();

      document.querySelectorAll(".option").forEach(o=>o.onclick=null);
      next.classList.remove("hidden");
    };

    options.appendChild(div);
  });
}

function animateXP(points){
  let target = xp + points;
  let interval = setInterval(()=>{
    xp++;
    document.getElementById("xp").innerText = xp;

    if(xp >= target){
      clearInterval(interval);
    }
  }, 50);
}

function next(){
  index++;
  if(index >= data.length){
    confetti();
    setTimeout(()=>alert("🎉 Level Completed!"), 300);
    setTimeout(()=>location.reload(), 1500);
  } else {
    load();
  }
}

function update(){
  let percent = (xp/20)*100;
  bar.style.width = percent + "%";
}
</script>

</body>
</html>
